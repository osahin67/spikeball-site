<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ozan Alexander Sahin | G League Spikeball</title>

<style>
  
  .join-btn{
display:inline-block;
margin-top:15px;
margin-bottom:10px;
padding:14px 26px;
background:#ffd400;
color:#000;
text-decoration:none;
font-weight:700;
border-radius:999px;
transition:.25s ease;
box-shadow:0 10px 25px rgba(255,212,0,.25);
}


.join-btn:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 16px 35px rgba(255,212,0,.35);
}

/* font from main site */
@import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#050505;
color:#ffd400;
text-align:center;
}

/* header */

header{
background:#0a0a0a;
border-bottom:3px solid #ffd400;
padding:25px 20px;
}

header h1{
font-family:"Permanent Marker", cursive;
font-size:42px;
letter-spacing:4px;
margin:0;
text-shadow:
-3px -3px 0 #000,
3px 3px 0 #000,
0 0 14px rgba(255,212,0,.6);
}

/* player container */

.player-container{
max-width:700px;
margin:80px auto;
background:rgba(255,212,0,0.05);
border:1px solid rgba(255,212,0,0.25);
border-radius:22px;
padding:40px;
box-shadow:0 18px 40px rgba(0,0,0,0.5);

opacity:0;
animation:fadeUp .8s ease forwards;
}

/* player image */

.player-img{
width:200px;
height:200px;
object-fit:cover;
border-radius:50%;
border:4px solid #ffd400;
box-shadow:0 0 25px rgba(255,212,0,.4);
margin-bottom:20px;

opacity:0;
animation:fadeUp .8s ease .2s forwards;
}

/* name */

.player-name{
font-size:36px;
margin-bottom:10px;

opacity:0;
animation:fadeUp .8s ease .35s forwards;
}

/* stats */

.player-stats{
margin-top:20px;
font-size:18px;
color:#fff4b7;
line-height:1.7;

opacity:0;
animation:fadeUp .8s ease .5s forwards;
}

/* stat boxes */

.stats-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:30px;

opacity:0;
animation:fadeUp .8s ease .65s forwards;
}

.stat-card{
background:rgba(255,212,0,0.08);
border:1px solid rgba(255,212,0,0.25);
border-radius:14px;
padding:18px;
}

.stat-card strong{
display:block;
font-size:22px;
color:#ffd400;
}

/* button */

.back-btn{
display:inline-block;
margin-top:35px;
padding:14px 26px;
background:#ffd400;
color:#000;
font-weight:bold;
border-radius:999px;
text-decoration:none;
transition:.25s;

opacity:0;
animation:fadeUp .8s ease .8s forwards;
}

.back-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(255,212,0,.3);
}

/* fade animation */

@keyframes fadeUp{
0%{
opacity:0;
transform:translateY(40px);
}
100%{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<header>
<h1>G League Spikeball</h1>
</header>

<div class="player-container">

<img src="player.png" class="player-img">

<div class="player-name">Ozan Alexander Sahin</div>

<div class="player-stats">

<p><strong>Rank:</strong> #1</p>
<p><strong>League:</strong> G League Spikeball</p>
<p><strong>Home Court:</strong> Sydney Casper Park, Gilroy</p>

</div>

<div class="stats-grid">

<div class="stat-card">
<strong>18</strong>
Wins
</div>

<div class="stat-card">
<strong>27</strong>
Aces
</div>

<div class="stat-card">
<strong>92%</strong>
Serve Accuracy
</div>

</div>
  
<a href="https://gleaguespikeball.github.io/form/" class="join-btn">
Player Stat Reevaluation Form
</a>
  
<a class="back-btn" href="index.html">Back to League</a>

</div>

</body>
</html>
